name: WordPress Auto Post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード（dry-run で確認 / post で投稿）"
        type: choice
        required: true
        default: "dry-run"
        options:
          - dry-run
          - post
      limit:
        description: "投稿件数（0 で全件）"
        type: string
        required: true
        default: "1"
      post_status:
        description: "投稿ステータス"
        type: choice
        required: true
        default: "draft"
        options:
          - draft
          - pending
          - publish
      write_mode:
        description: "書き込みモード"
        type: choice
        required: true
        default: "create_only"
        options:
          - create_only
          - update_only
          - upsert
      input_file:
        description: "制作管理表のパス"
        type: string
        required: true
        default: "data/seo_80kw_production_management_v2_with_image_prompt_sheet.xlsx"
      sheet_name:
        description: "Excel シート名"
        type: string
        required: true
        default: "制作管理表"
      update_excel:
        description: "投稿結果を制作管理表(Excel)へ書き戻してコミットする"
        type: boolean
        required: true
        default: false

# 同時実行を禁止し、二重投稿事故を防ぐ
concurrency:
  group: wp-auto-post
  cancel-in-progress: false

# Excel 書き戻しのコミットに備えて write を付与（コミットは update_excel=true 時のみ）
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WordPress auto post
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.mode }}" = "dry-run" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          UPDATE_EXCEL_FLAG=""
          if [ "${{ inputs.update_excel }}" = "true" ]; then
            UPDATE_EXCEL_FLAG="--update-excel"
          fi

          python wp_auto_post.py \
            --input "${{ inputs.input_file }}" \
            --sheet "${{ inputs.sheet_name }}" \
            --articles-dir articles \
            --images-dir eyecatches \
            --post-status "${{ inputs.post_status }}" \
            --write-mode "${{ inputs.write_mode }}" \
            --limit "${{ inputs.limit }}" \
            --output-dir results \
            $DRY_RUN_FLAG $UPDATE_EXCEL_FLAG

      - name: Upload result CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-auto-post-results
          path: results/results_*.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Commit updated Excel
        if: ${{ inputs.update_excel == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.input_file }}"
          if git diff --cached --quiet; then
            echo "Excel に変更はありません。"
          else
            git commit -m "Update production sheet with post results [skip ci]"
            git push
          fi
