name: Export WordPress Security Workbook

on:
  pull_request:
    paths:
      - ".github/export-workbook.marker"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-security-production-workbook
          path: data/wordpress-security-production.xlsx
          if-no-files-found: error
          retention-days: 1
